name: copd_ai_health_app
description: "A Flutter application for COPD management using AI and health data integration."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  cactus: ^0.2.4
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_markdown: ^0.7.4+1
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  path_provider: ^2.1.5
  http: ^1.5.0
  pedometer: ^4.0.2
  permission_handler: ^11.3.1
  llama_flutter_android: ^0.1.1
  url_launcher: ^6.3.2
  health: ^13.1.4
  sensors_plus: ^7.0.0
  shared_preferences: ^2.5.3
  battery_plus: ^6.0.3
  share_plus: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png" # Path to your source image
  min_sdk_android: 26 # should be same as your min sdk in build.gradle
